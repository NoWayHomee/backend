version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nowayhome-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234 # Thay bằng pass của bạn
      POSTGRES_DB: agoda_clone
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: