services:
  postgres:
    image: postgres:16-alpine
    container_name: nowayhome-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nowayhome
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nowayhome_network

volumes:
  postgres_data:

networks:
  nowayhome_network:
    driver: bridge
