version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nowayhome-postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Ánh xạ port máy host qua biến môi trường để tránh xung đột giữa các dev
      - '${DB_LOCAL_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nowayhome_network

volumes:
  postgres_data:

networks:
  nowayhome_network:
    driver: bridge